<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Social links profile</title>

</head>
<body>

  <main>

    <article class="card">

      <img class="profile-image" src="./images/avatar-jessica.jpeg" alt="Web profile image of Jessica Randall">

      <div class="profile-info">
      <h1 class="name">Jessica Randall</h1>
      <p class="location">London, United Kingdom</p>
      </div>
      
      <p>&ldquo;Front-end developer and avid reader.&rdquo;</p>

      <ul>
        <li><a href="https://github.com/joparke" target="_blank">GitHub</a></li>
        <li><a href="https://www.frontendmentor.io" target="_blank">Frontend Mentor</a></li>
        <li><a href="https://www.linkedin.com" target="_blank">LinkedIn</a></li>
        <li><a href="https://www.twitter.com" target="_blank">Twitter</a></li>
        <li><a href="https://www.instagram.com" target="_blank">Instagram</a></li>
      </ul>

    </article>

  </main>
  
<footer class="attribution">
    <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/joparke">JP.</a></p>
</footer>
</body>
</html>
